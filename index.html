<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>zerotoin.com - Swipe News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----- TOP BAR ----- */
        .top-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 8px;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: -0.3px;
        }

        /* ----- SIDEBAR (same as before) ----- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            z-index: 200;
            padding-top: 70px;
        }
        .sidebar.open { left: 0; }
        .sidebar a {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            border-bottom: 1px solid #eee;
        }
        .close-sidebar {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 150;
            display: none;
        }
        .overlay.active { display: block; }

        /* ----- MIDDLE: SWIPING CAROUSEL (horizontal) ----- */
        .carousel-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 0;
            background: #f0f2f5;
        }

        .carousel-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            touch-action: pan-y pinch-zoom; /* allow vertical scroll, but horizontal drag works */
        }

        .carousel-track {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            padding: 20px 10%;
            cursor: grab;
        }
        .carousel-track:active {
            cursor: grabbing;
        }

        /* Hide scrollbar for cleaner look (optional) */
        .carousel-track::-webkit-scrollbar {
            height: 6px;
        }
        .carousel-track::-webkit-scrollbar-track {
            background: #ddd;
            border-radius: 10px;
        }
        .carousel-track::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .news-card {
            flex: 0 0 80%;
            max-width: 350px;
            scroll-snap-align: center;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .news-card:hover {
            transform: scale(1.02);
        }

        .news-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .news-content {
            padding: 20px;
        }
        .news-title {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .news-summary {
            color: #555;
            margin: 10px 0;
            line-height: 1.4;
        }
        .news-date {
            font-size: 0.8rem;
            color: #888;
        }

        /* Navigation arrows (for desktop) */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 2rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: 0.2s;
        }
        .carousel-btn:hover {
            background: rgba(0,0,0,0.8);
        }
        .btn-prev { left: 15px; }
        .btn-next { right: 15px; }

        /* ----- BOTTOM NAV ----- */
        .bottom-nav {
            background: white;
            border-top: 1px solid #eaeaea;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 14px;
            position: sticky;
            bottom: 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #666;
            font-size: 0.75rem;
            gap: 4px;
        }
        .nav-item span:first-child { font-size: 1.5rem; }
        .nav-item.active { color: #0077ff; }

        @media (max-width: 768px) {
            .carousel-track { padding: 20px 5%; }
            .news-card { flex: 0 0 85%; }
            .carousel-btn { display: none; } /* arrows hidden on mobile, swipe only */
        }
        @media (min-width: 1024px) {
            .news-card { flex: 0 0 30%; max-width: 400px; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="site-title">zerotoin.com</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="close-sidebar" id="closeSidebar">✕</button>
        <a href="#">🏠 Home</a>
        <a href="#">🎮 Play</a>
        <a href="#">📂 Categories</a>
        <a href="#">👤 Account</a>
        <a href="#">⭐ Saved</a>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- MIDDLE: SWIPING CAROUSEL -->
    <div class="carousel-container">
        <div class="carousel-wrapper">
            <button class="carousel-btn btn-prev" id="prevBtn">‹</button>
            <div class="carousel-track" id="carouselTrack">
                <!-- News cards will be inserted here by JS -->
            </div>
            <button class="carousel-btn btn-next" id="nextBtn">›</button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active" data-nav="home"><span>🏠</span><span>Home</span></a>
        <a href="#" class="nav-item" data-nav="play"><span>🎮</span><span>Play</span></a>
        <a href="#" class="nav-item" data-nav="categories"><span>📂</span><span>Categories</span></a>
        <a href="#" class="nav-item" data-nav="account"><span>👤</span><span>Account</span></a>
    </div>

    <script>
        // ----- NEWS DATA (Replace image URLs with your Cloudinary links) -----
        const newsData = [
            {
                title: "Breaking: AI Changes Everything",
                summary: "New AI models are reshaping industries worldwide.",
                date: "June 10, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_800,h_600,c_fill/sample.jpg"
            },
            {
                title: "Gaming Highlights 2026",
                summary: "Top upcoming games you cannot miss.",
                date: "June 9, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_800,h_600,c_fill/sample_gears.jpg"
            },
            {
                title: "Health & Wellness Trends",
                summary: "Simple habits for a healthier life.",
                date: "June 8, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_800,h_600,c_fill/health.jpg"
            },
            {
                title: "Space Mission Success",
                summary: "New images from Mars rover amaze scientists.",
                date: "June 7, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_800,h_600,c_fill/space.jpg"
            },
            {
                title: "Finance Tips for Beginners",
                summary: "Start investing with confidence.",
                date: "June 6, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_800,h_600,c_fill/finance.jpg"
            }
        ];

        const track = document.getElementById('carouselTrack');
        function renderCards() {
            track.innerHTML = newsData.map(news => `
                <div class="news-card">
                    <img src="${news.imageUrl}" alt="${news.title}" loading="lazy">
                    <div class="news-content">
                        <h3 class="news-title">${news.title}</h3>
                        <p class="news-summary">${news.summary}</p>
                        <div class="news-date">📅 ${news.date}</div>
                    </div>
                </div>
            `).join('');
        }
        renderCards();

        // Sidebar logic
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeSidebar = document.getElementById('closeSidebar');
        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
        function closeSidebarFunc() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
        menuBtn.addEventListener('click', openSidebar);
        closeSidebar.addEventListener('click', closeSidebarFunc);
        overlay.addEventListener('click', closeSidebarFunc);

        // Carousel swipe (horizontal scroll) is native: user can drag/scroll. 
        // Buttons for desktop to scroll left/right.
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        if (prevBtn && nextBtn) {
            prevBtn.addEventListener('click', () => {
                track.scrollBy({ left: -300, behavior: 'smooth' });
            });
            nextBtn.addEventListener('click', () => {
                track.scrollBy({ left: 300, behavior: 'smooth' });
            });
        }

        // Bottom nav highlight (simple)
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const tab = item.getAttribute('data-nav');
                if (tab === 'home') {
                    // nothing extra
                } else {
                    alert(`"${tab}" section coming soon – you can customize.`);
                }
            });
        });

        // Small touch: if user wants to drag with mouse on desktop
        let isDown = false;
        let startX;
        let scrollLeft;
        track.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - track.offsetLeft;
            scrollLeft = track.scrollLeft;
            track.style.cursor = 'grabbing';
        });
        track.addEventListener('mouseleave', () => {
            isDown = false;
            track.style.cursor = 'grab';
        });
        track.addEventListener('mouseup', () => {
            isDown = false;
            track.style.cursor = 'grab';
        });
        track.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - track.offsetLeft;
            const walk = (x - startX) * 2; // scroll speed
            track.scrollLeft = scrollLeft - walk;
        });
        track.style.cursor = 'grab';
    </script>
</body>
</html>
