<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>zerotoin.com - Swipe News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: black;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* ----- TOP BAR ----- */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 200;
            color: white;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 8px;
        }
        .site-title {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: -0.3px;
            flex: 1;
        }
        /* Fullscreen button style */
        .fullscreen-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        /* ----- SIDEBAR MENU ----- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 12px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            z-index: 300;
            padding-top: 70px;
        }
        .sidebar.open { left: 0; }
        .sidebar a {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            border-bottom: 1px solid #eee;
        }
        .close-sidebar {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 250;
            display: none;
        }
        .overlay.active { display: block; }

        /* ----- SWIPE CONTAINER ----- */
        .swipe-container {
            height: 100vh;
            width: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .swipe-container::-webkit-scrollbar {
            display: none;
        }

        .news-item {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        /* 9:16 image container */
        .image-916 {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-916 img {
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: cover;
            aspect-ratio: 9 / 16;
        }
        @media (min-aspect-ratio: 9/16) {
            .image-916 img {
                width: auto;
                height: 100%;
            }
        }
        @media (max-aspect-ratio: 9/16) {
            .image-916 img {
                width: 100%;
                height: auto;
            }
        }

        /* text overlay */
        .news-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            color: white;
            padding: 80px 20px 30px;
            pointer-events: none;
        }
        .news-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 1px 3px black;
        }
        .news-summary {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 8px;
            max-width: 90%;
        }
        .news-date {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 18px;
            z-index: 200;
            border-top: 0.5px solid rgba(255,255,255,0.2);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #aaa;
            font-size: 0.7rem;
            gap: 4px;
            transition: color 0.2s;
        }
        .nav-item span:first-child { font-size: 1.5rem; }
        .nav-item.active { color: #0077ff; }

        /* hint */
        .swipe-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Top Bar with Fullscreen Button -->
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="site-title">zerotoin.com</div>
        <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="close-sidebar" id="closeSidebar">✕</button>
        <a href="#">🏠 Home</a>
        <a href="#">🎮 Play</a>
        <a href="#">📂 Categories</a>
        <a href="#">👤 Account</a>
        <a href="#">⭐ Favorites</a>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- Swipeable vertical news list -->
    <div class="swipe-container" id="swipeContainer">
        <!-- news items injected by JS -->
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active" data-nav="home"><span>🏠</span><span>Home</span></a>
        <a href="#" class="nav-item" data-nav="play"><span>🎮</span><span>Play</span></a>
        <a href="#" class="nav-item" data-nav="categories"><span>📂</span><span>Categories</span></a>
        <a href="#" class="nav-item" data-nav="account"><span>👤</span><span>Account</span></a>
    </div>
    <div class="swipe-hint">⬆️ Swipe up / down ⬇️</div>

    <script>
        // ---------- NEWS DATA (replace with your Cloudinary image URLs) ----------
        const newsData = [
            {
                title: "Breaking: AI Revolution",
                summary: "New models are changing how we work and live.",
                date: "June 11, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_900,h_1600,c_fill/sample.jpg"
            },
            {
                title: "Gaming Awards 2026",
                summary: "All winners and biggest surprises of the year.",
                date: "June 10, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_900,h_1600,c_fill/sample_gears.jpg"
            },
            {
                title: "Health Tips Daily",
                summary: "Simple morning routine for better energy.",
                date: "June 9, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_900,h_1600,c_fill/health.jpg"
            },
            {
                title: "Space X Launch Success",
                summary: "Starship completes orbital flight test.",
                date: "June 8, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_900,h_1600,c_fill/space.jpg"
            },
            {
                title: "Finance Made Simple",
                summary: "Top 3 investment strategies for beginners.",
                date: "June 7, 2026",
                imageUrl: "https://res.cloudinary.com/demo/image/upload/w_900,h_1600,c_fill/finance.jpg"
            }
        ];

        const swipeContainer = document.getElementById('swipeContainer');

        function renderNewsItems() {
            swipeContainer.innerHTML = newsData.map(news => `
                <div class="news-item">
                    <div class="image-916">
                        <img src="${news.imageUrl}" alt="${news.title}" loading="lazy">
                    </div>
                    <div class="news-overlay">
                        <div class="news-title">${news.title}</div>
                        <div class="news-summary">${news.summary}</div>
                        <div class="news-date">📅 ${news.date}</div>
                    </div>
                </div>
            `).join('');
        }
        renderNewsItems();

        // ---------- FULLSCREEN FUNCTION (your provided model) ----------
        function openFullscreen() {
            document.documentElement.requestFullscreen();
        }
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', openFullscreen);

        // ---------- SIDEBAR MENU LOGIC ----------
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeSidebar = document.getElementById('closeSidebar');
        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
        function closeSidebarFunc() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
        menuBtn.addEventListener('click', openSidebar);
        closeSidebar.addEventListener('click', closeSidebarFunc);
        overlay.addEventListener('click', closeSidebarFunc);

        // ---------- BOTTOM NAV HIGHLIGHT ----------
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const tab = item.getAttribute('data-nav');
                if (tab !== 'home') {
                    alert(`"${tab}" section – you can customize this later.`);
                }
            });
        });

        // Keyboard arrow keys for desktop
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                swipeContainer.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
                e.preventDefault();
            } else if (e.key === 'ArrowUp') {
                swipeContainer.scrollBy({ top: -window.innerHeight, behavior: 'smooth' });
                e.preventDefault();
            }
        });

        console.log("Vertical swipe news ready – fullscreen button added.");
    </script>
</body>
</html>
