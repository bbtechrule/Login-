<!DOCTYPE html>
<html>
<head>
    <title>My News Site</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #f0f0f0; }
        .news-item { background: white; margin-bottom: 20px; padding: 15px; border-radius: 8px; display: flex; gap: 15px; }
        .news-item img { width: 150px; height: 100px; object-fit: cover; border-radius: 5px; }
        h2 { margin: 0 0 10px; }
        .date { color: gray; font-size: 14px; }
    </style>
</head>
<body>
    <h1>📰 My News Website</h1>
    <div id="news-list"></div>

    <script>
        // This is where you will manually add your news
        const myNews = [
            {
                title: "My first news article",
                date: "2026-06-10",
                summary: "This is a short summary of my news.",
                imageUrl: "YOUR_CLOUDINARY_IMAGE_URL",
                link: "#"
            },
            // Add more news items here following the same format
        ];

        const container = document.getElementById('news-list');
        myNews.forEach(news => {
            container.innerHTML += `
                <div class="news-item">
                    <img src="${news.imageUrl}" alt="news image">
                    <div>
                        <h2>${news.title}</h2>
                        <div class="date">${news.date}</div>
                        <p>${news.summary}</p>
                        <a href="${news.link}">Read more →</a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
