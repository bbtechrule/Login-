<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>zerotoin.com - Fullscreen Video</title>
    <style>
        /* Reset and base styles for fullscreen video */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        /* Main container takes full screen, above bottom nav */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
        }

        /* Video element fills container, object-fit cover ensures full bleed */
        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Bottom navigation (visible above video) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 20px;
            z-index: 20;
            border-top: 0.5px solid rgba(255,255,255,0.2);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #ccc;
            font-size: 0.7rem;
            gap: 4px;
            transition: color 0.2s;
        }
        .nav-item span:first-child { font-size: 1.5rem; }
        .nav-item.active { color: #0077ff; }

        /* Optional hint for users */
        .swipe-hint {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <!-- Fullscreen Video Area -->
    <div class="video-container">
        <video id="mainVideo" 
               src="https://res.cloudinary.com/dujoufris/video/upload/v1781142042/download_20260611_070849_0000_rkeea4.mp4"
               autoplay
               muted
               playsinline
               controls
               preload="auto">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Simple Bottom Navigation -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active" data-nav="home"><span>🏠</span><span>Home</span></a>
        <a href="#" class="nav-item" data-nav="play"><span>🎮</span><span>Play</span></a>
        <a href="#" class="nav-item" data-nav="categories"><span>📂</span><span>Categories</span></a>
        <a href="#" class="nav-item" data-nav="account"><span>👤</span><span>Account</span></a>
    </div>
    <div class="swipe-hint">⬆️ Swipe up/down video ⬇️ | Tap for fullscreen</div>

    <script>
        // Get video element
        const video = document.getElementById('mainVideo');
        
        // ----- FULLSCREEN TOGGLE (tap/click on video) -----
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        // Add event listener to video for fullscreen toggle
        video.addEventListener('click', toggleFullscreen);
        
        // ----- SWIPE CONTROLS (up/down to simulate next video) -----
        let touchStartY = 0;
        let touchEndY = 0;
        
        video.addEventListener('touchstart', (e) => {
            touchStartY = e.changedTouches[0].screenY;
        }, false);
        
        video.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, false);
        
        // Also support mouse drag for desktop testing
        let mouseStartY = 0;
        let isDragging = false;
        video.addEventListener('mousedown', (e) => {
            isDragging = true;
            mouseStartY = e.screenY;
            e.preventDefault();
        });
        window.addEventListener('mouseup', (e) => {
            if (isDragging) {
                const mouseEndY = e.screenY;
                const diff = mouseStartY - mouseEndY;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        swipeNext();
                    } else {
                        swipePrevious();
                    }
                }
                isDragging = false;
            }
        });
        
        function handleSwipe() {
            const diff = touchStartY - touchEndY;
            if (Math.abs(diff) < 50) return; // minimum distance for swipe
            if (diff > 0) {
                swipeNext();
            } else {
                swipePrevious();
            }
        }
        
        // For simplicity, we show an alert for next/previous
        // Later you can replace these with actual video playlist logic
        function swipeNext() {
            alert('Swipe up detected: Play next video');
            // Here you would load the next video in your playlist
        }
        
        function swipePrevious() {
            alert('Swipe down detected: Play previous video');
            // Here you would load the previous video
        }
        
        // Optional: handle autoplay after fullscreen changes on some browsers
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                // Ensure video keeps playing when exiting fullscreen
                video.play().catch(e => console.log("Autoplay prevented:", e));
            }
        });
        
        console.log("Fullscreen video player ready – tap video for fullscreen, swipe up/down for next/previous.");
    </script>
</body>
</html>
