<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zerotoin.com</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    z-index:1000;
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.menu{
    font-size:28px;
    cursor:pointer;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.fullscreen-btn{
    font-size:24px;
    cursor:pointer;
}

/* MAIN */
.main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:60px;
    padding-bottom:70px;
}

/* 9:16 IMAGE FRAME */
.image-box{
    width:90vw;
    max-width:360px;
    aspect-ratio:9/16;
    background:#222;
    border-radius:15px;
    overflow:hidden;
    border:2px solid #444;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    background:#111;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav-item{
    text-align:center;
    font-size:14px;
    cursor:pointer;
}

.nav-item span{
    display:block;
    font-size:24px;
    margin-bottom:3px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="left">
        <div class="menu">☰</div>
        <div class="logo">zerotoin.com</div>
    </div>

    <div class="fullscreen-btn" onclick="toggleFullscreen()">
        ⛶
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <div class="image-box">
        <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg"
             alt="Cloudinary Test Image">
    </div>

</div>

<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">

    <div class="nav-item">
        <span>🏠</span>
        Home
    </div>

    <div class="nav-item">
        <span>▶️</span>
        Videos
    </div>

    <div class="nav-item">
        <span>📂</span>
        Categories
    </div>

    <div class="nav-item">
        <span>👤</span>
        Account
    </div>

</div>

<script>
function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
